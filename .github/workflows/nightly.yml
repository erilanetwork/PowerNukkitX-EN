name: Nightly Release

on:
  push:

jobs:
  nightly:
    name: Nightly Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f236b35da9d031e13b1005234ebe4392ed54c580

      - name: Build PNX Server
        run: ./gradlew buildForGithubAction --no-configuration-cache

      - name: Release Nightly
        uses: xotl/cool-github-releases@7dcf348937ee2345e1b3a4bc80926d6cdb4a4492 # v1.1.10
        if: success()
        with:
          mode: update
          isPrerelease: false
          tag_name: nightly
          release_name: "Nightly Release"
          body_mrkdwn: |
            This is the **nightly version of PowerNukkitX**, built from the latest source.
            
            **Corresponding commit:** <https://github.com/powernukkitx/powernukkitx/commit/${{ github.sha }}>
            
            > [!NOTE]
            > This is an unstable build. Please use it with caution.
            
            ### How to Update
            
            1. Download the `powernukkitx.jar` file from the assets below.
            2. Replace the `powernukkitx.jar` file in your server's directory with the new one.
            3. Restart your server.
          assets: build/powernukkitx.jar
          replace_assets: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
